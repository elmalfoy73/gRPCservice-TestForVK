syntax = "proto3";

package kv;

option java_package = "com.example.grpc";
option java_outer_classname = "KvProto";

import "google/protobuf/wrappers.proto";

service KvService {
  rpc Put(PutRequest)       returns (PutResponse);
  rpc Get(GetRequest)       returns (GetResponse);
  rpc Delete(DeleteRequest) returns (DeleteResponse);
  rpc Range(RangeRequest)   returns (stream RangeResponse);
  rpc Count(CountRequest)   returns (CountResponse);
}

message PutRequest {
  string key = 1;
  google.protobuf.BytesValue value = 2;
}
message PutResponse {}

message GetRequest  { string key = 1; }
message GetResponse {
  google.protobuf.BytesValue value = 1;
}

message DeleteRequest  { string key = 1; }
message DeleteResponse {}

message RangeRequest {
  string key_since = 1;
  string key_to    = 2;
}
message RangeResponse {
  string key = 1;
  google.protobuf.BytesValue value = 2;
}

message CountRequest  {}
message CountResponse { int64 count = 1; }
